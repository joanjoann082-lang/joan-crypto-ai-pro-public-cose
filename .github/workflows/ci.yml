name: bot-ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  syntax-and-repository-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repository state
        run: |
          echo "Branch: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          find . -maxdepth 3 -type f | sort | head -200

      - name: Block risky tracked files
        run: |
          echo "Checking tracked files..."
          git ls-files | grep -Ei '(^|/)(\.env|.*token.*|.*secret.*|.*credential.*|.*key.*|.*pem)$|(\.db|\.sqlite|\.sqlite3|\.jsonl|\.log|\.zip)$' && exit 1 || true
          echo "No risky tracked files detected."

      - name: Python syntax compile
        run: |
          python - <<'PY'
          import py_compile
          import pathlib
          import sys

          excluded = {
              ".git",
              ".github",
              "__pycache__",
              ".venv",
              "venv",
              "data",
              "logs",
              "backups",
              ".patch_backups",
          }

          files = []
          for path in pathlib.Path(".").rglob("*.py"):
              parts = set(path.parts)
              if parts & excluded:
                  continue
              files.append(path)

          print(f"Python files found: {len(files)}")

          failed = []
          for path in files:
              try:
                  py_compile.compile(str(path), doraise=True)
              except Exception as e:
                  failed.append((str(path), str(e)))

          if failed:
              print("COMPILE FAILED:")
              for f, e in failed:
                  print(f"{f}: {e}")
              sys.exit(1)

          print("COMPILE OK")
          PY
